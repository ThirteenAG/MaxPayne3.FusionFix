[MAIN]
SkipIntro = 1
HideSkipButton = 1
DisableGlobalLeaderboards = 1     // Fixes Hoboken Alleys map crash in coop
SubtitlesSizeMultiplier = 1.0
OutlinesSizeMultiplier = 1.0
BorderlessWindowed = 1
LightSyncRGB = 1                  // Only Logitech hardware is supported, requires Logitech G HUB app
DisableDeviceChangeEvent = 1      // Fixes an issue when the game randomly enters pause menu
HudAspectRatioConstraint = Auto   // Constrains the HUD to an aspect ratio. Use Auto, 16:9, 21:9, or a custom ratio
CustomFOV = 0.0                   // Set a custom FOV value. 0.0 to 45.0 range is supported. Use + and - keys or LT and RT to adjust the FOV in-game while being in display menu
ConsoleGamma = 0
GamepadIcons = 0
; 0 - Xbox 360
; 1 - Xbox One
; 2 - Playstation 3
; 3 - Playstation 4
; 4 - Playstation 5
; 5 - Nintendo Switch
; 6 - Steam Deck
; 7 - Steam Controller